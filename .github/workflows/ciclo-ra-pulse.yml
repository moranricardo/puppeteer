name: Ciclo de Ra - Pulse Orchestrator & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  orchestrate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js (Versión Actualizada)
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Pasamos a la versión recomendada y nativa

    - name: Instalar paquetes Node
      run: npm install

    - name: Instalar Chrome y sus dependencias de Linux
      run: npx puppeteer browsers install chrome --with-deps

    - name: Ejecutar Orquestador Maestro (index.js)
      env:
        GITHUB_ACTIONS: 'true'
      run: node index.js

    - name: Verificar cambios en la telemetría
      id: verify_changes
      run: |
        git diff --exit-code state.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Persistir estado de telemetría (Commit & Push)
      if: steps.verify_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add state.json
        git commit -m "🤖 telemetry: actualización automática del pulso del sistema [skip ci]"
        git push
