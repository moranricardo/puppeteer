name: Gerrit Cognitive Bridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  cognitive-bridge:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout repository
      uses: actions/checkout@v4

    - name: 2. Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: 4. Procesar Payload Local (Sin API)
      run: |
        python -c "
        import json, os
        json_path = 'data/gerrit_payload.json'
        if os.path.exists(json_path):
            with open(json_path, 'r') as f:
                data = json.load(f)
            print('✅ JSON cargado correctamente. Elementos encontrados:', len(data) if isinstance(data, list) else 'Objeto')
            print(json.dumps(data[:2] if isinstance(data, list) else data, indent=2))
        else:
            print('⚠️ Advertencia: El archivo de payload no existe, omitiendo.')
        "
