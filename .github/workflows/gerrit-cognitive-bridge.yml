      - name: 4. Interrogar Puente Cognitivo (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os
          import json
          import sys
          from google import genai

          # Validación de entorno
          api_key = os.environ.get('GEMINI_API_KEY')
          if not api_key:
              print('⚠️ GEMINI_API_KEY no configurada. Saltando análisis cognitivo.')
              sys.exit(0)

          # Validación de datos
          json_path = 'data/gerrit_payload.json'
          if not os.path.exists(json_path):
              print(f'⚠️ Archivo {json_path} no encontrado. Omitiendo paso.')
              sys.exit(0)

          try:
              with open(json_path, 'r') as f:
                  data = json.load(f)
              
              # Procesar solo si hay datos reales
              if not data:
                  print('ℹ️ Payload de Gerrit vacío. Nada que analizar.')
                  sys.exit(0)

              client = genai.Client(api_key=api_key)
              contexto = json.dumps(data[:2], indent=2)
              prompt = f'''Eres el núcleo cognitivo del proyecto Ra Pulse.
              Analiza la siguiente telemetría de cambios del Gerrit de LineageOS y genera una recomendación técnica estructurada:
              {contexto}'''

              print('🤖 Interrogando núcleo cognitivo (Gemini)...')
              response = client.models.generate_content(
                  model='gemini-2.5-flash',
                  contents=prompt,
              )
              
              print('\n--- [RESULTADO DEL PUENTE COGNITIVO] ---')
              print(response.text)

 HEAD
          except Exception as e:
              print(f'❌ Error en el proceso cognitivo: {e}')
              sys.exit(1)
          "

