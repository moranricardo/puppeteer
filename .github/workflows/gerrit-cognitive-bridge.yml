name: "Ra Pulse: Puente Cognitivo en la Nube"

on:
  push:
    branches: [ main ]

jobs:
  analyze-gerrit:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar Dependencias Actualizadas de Google
        run: |
          pip install google-genai

      - name: 4. Interrogar Puente Cognitivo (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os
          import json
          from google import genai

          if 'GEMINI_API_KEY' not in os.environ or not os.environ['GEMINI_API_KEY']:
              print('❌ Error: La clave secreta GEMINI_API_KEY llego vacia al contenedor.')
              exit(1)

          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])

          json_path = 'data/gerrit_payload.json'
          with open(json_path, 'r') as f:
              gerrit_data = json.load(f)

          contexto = json.dumps(gerrit_data[:2], indent=2)
          prompt = f'''Eres el núcleo cognitivo del proyecto Ra Pulse.
          Analiza la siguiente telemetría de cambios extraídos del Gerrit de LineageOS.
          Identifica parches críticos de seguridad o actualizaciones relevantes y genera una recomendación estructurada de ingeniería:

          {contexto}
          '''

          print('🤖 Enviando contexto a Gemini...')
          response = client.models.generate_content(
              model='gemini-2.5-flash',
              contents=prompt,
          )
          print('\n--- [RA PULSE RESPUESTA COGNITIVA] ---')
          print(response.text)
          "
