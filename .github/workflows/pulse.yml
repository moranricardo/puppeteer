name: Ciclo de Ra - Pulse Orchestrator

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta automáticamente cada hora
  workflow_dispatch:     # Permite la ejecución manual desde la interfaz de GitHub

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci || npm install

    - name: Ejecutar Orquestador Maestro (index.js)
      env:
        GITHUB_ACTIONS: 'true'
        CYCLE_INTERVAL_MS: '0' # En CI se ejecuta un único ciclo de validación
      run: node index.js

    - name: Verificar cambios en la telemetría
      id: verify_changes
      run: |
        git diff --exit-code state.json || echo "changed=true" >> $GITHUB_OUTPUT

    - name: Persistir estado de telemetría (Commit & Push)
      if: steps.verify_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add state.json
        git commit -m "🤖 telemetry: actualización automática del pulso del sistema [skip ci]"
        git push
