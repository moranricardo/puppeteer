name: Ciclo de Ra - Pulse Orchestrator

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # Sincronización horaria automática
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: 🟢 Configurar Node.js (v24 Nativo)
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        # Eliminamos la directiva de caché para evitar el error por falta de lockfile

    - name: 📦 Inicializar e Instalar Entorno Ligero
      run: |
        if [ -f package.json ]; then
          npm install
        else
          npm init -y
          npm install
        fi

    - name: 🚀 Ejecutar Cliente REST Gerrit (Filtro Anti-XSS)
      run: |
        if [ -f scripts/gerrit-client.js ]; then
          node scripts/gerrit-client.js
        elif [ -f gerrit-check.js ]; then
          node gerrit-check.js
        else
          echo "⚠️ No se encontró un script activo en la topología."
        fi

    - name: 🔍 Verificar Cambios en la Telemetría
      id: verify_changes
      run: |
        git diff --exit-code state.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

    - name: 💾 Persistir Estado de Telemetría (Commit & Push)
      if: steps.verify_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add state.json
        git commit -m "🤖 telemetry: actualización automática del pulso del sistema [skip ci]"
        git push
