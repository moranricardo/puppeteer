name: Ra Pulse Orchestrator

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Execute Gerrit Audit
        env:
          GOOGLE_WEBHOOK_URL: ${{ secrets.GOOGLE_WEBHOOK_URL }}
        run: |
          node scripts/gerrit-client.js
          node scripts/telemetry-heart.js
          node scripts/google-bridge.js
          # Force commit hash mutation
