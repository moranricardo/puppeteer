name: Ciclo de Ra - Pulse Orchestrator & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # Se ejecuta automáticamente cada hora
  workflow_dispatch:

jobs:
  orchestrate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: 🟢 Configurar Node.js (v24)
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: 📦 Instalar paquetes Node
      run: npm install || npm ci

    - name: 🌐 Instalar Chrome y dependencias de Linux (Puppeteer)
      run: npx puppeteer browsers install chrome --with-deps

    - name: 🚀 Ejecutar Orquestador Maestro (index.js)
      env:
        GITHUB_ACTIONS: 'true'
        CYCLE_INTERVAL_MS: '0'
      run: node index.js

    - name: 📊 Ejecutar script de consulta (Gerrit Check)
      run: |
        if [ -f gerrit-check.js ]; then
          node gerrit-check.js
        elif [ -f scripts/gerrit-client.js ]; then
          node scripts/gerrit-client.js
        fi

    - name: 🔍 Verificar cambios en la telemetría
      id: verify_changes
      run: |
        git diff --exit-code state.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

    - name: 💾 Persistir estado de telemetría (Commit & Push)
      if: steps.verify_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add state.json
        git commit -m "🤖 telemetry: actualización automática del pulso del sistema [skip ci]"
        git push
