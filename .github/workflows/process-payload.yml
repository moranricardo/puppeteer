name: Process Payload Local

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Ejecutar Pulso Toroidal
      run: |
        python core/toroid_pulse.py

    - name: Mostrar Estado del Log de Consciencia
      run: |
        tail -n 5 knowledge/consciencia_log.jsonl
