name: Diamond Scraper CI Toroidal 818

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # FASE 1: Corrección de dependencias de Linux (Inclusión de libasound2t64 para Ubuntu modernizado)
      - name: Install OS Dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation libasound2t64 \
            libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 \
            libcups2 libdbus-1-3 libexpat1 libfontconfig1 \
            libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 \
            libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 \
            libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 \
            libxrender1 libxss1 libxtst6 lsb-release wget xdg-utils

      # FASE 2: Instalación de dependencias del proyecto
      - name: Install dependencies
        run: npm install

      # FASE 3: RESOLUCIÓN DE CONFLICTO (Módulo de acople directo del Navegador)
      - name: Install Puppeteer Browser
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "false"
          PUPPETEER_SKIP_DOWNLOAD: "false"
        run: |
          # Se fuerza la instalación global de la herramienta de comandos de puppeteer 
          # para que la terminal reconozca el comando 'puppeteer' nativamente
          npm install -g puppeteer-core puppeteer
          
          # Se descarga el binario ejecutable de Chrome usando la ruta directa del módulo local
          node ./node_modules/puppeteer/install.mjs || npx puppeteer browsers install chrome

      # FASE 4: Ejecución y Limpieza de caché
      - name: TrimCache Execution
        run: |
          rm -rf ~/.config/google-chrome
          rm -rf /tmp/.com.google.Chrome*
          rm -rf ~/.cache/puppeteer
          echo "Conflicto resuelto. Matriz Toroidal 818 estabilizada."

      # - name: Run Script
      #   run: node index.js