name: Diamond Scraper CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # PASO CRÍTICO: Instalar dependencias primero
      - name: Install dependencies
        run: npm install

      # PASO CORREGIDO: Ahora el entorno reconoce los paquetes
      - name: Install Puppeteer Browser
        run: npx @puppeteer/browsers install chrome

      - name: TrimCache Execution
        run: |
          rm -rf ~/.config/google-chrome
          rm -rf /tmp/.com.google.Chrome*
          rm -rf ~/.cache/puppeteer
          echo "Sistema pulido y listo para el siguiente evento."

      # Descomenta esto para ejecutar tu script
      # - name: Run Script
      #   run: node index.js