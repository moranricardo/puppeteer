    - name: Install Dependencies
      run: npm install

    - name: Install Puppeteer Browser
      # El comando debe estar en una sola línea para evitar el error de shell
      run: npx @puppeteer/browsers install chrome

    - name: Wait for Data Sync
      # Esto añade una pausa de 10 segundos antes de continuar
      run: sleep 10

    - name: TrimCache Execution
      run: |
        # Eliminación segura de archivos temporales específicos, NO del sistema raíz
        rm -rf ~/.config/google-chrome
        rm -rf /tmp/.com.google.Chrome*
        rm -rf ~/.cache/puppeteer
        echo "Sistema pulido y listo para el siguiente evento."

    - name: Run Script
      run: node index.js
