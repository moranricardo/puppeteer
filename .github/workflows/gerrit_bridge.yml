name: Gerrit Cognitive Bridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: 4. Interrogar Puente Cognitivo (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "
          import os, json, sys, time
          from google import genai
          from google.genai.errors import APIError

          api_key = os.environ.get('GEMINI_API_KEY')
          json_path = 'data/gerrit_payload.json'

          if not api_key:
              print('❌ Error: GEMINI_API_KEY no configurada.')
              sys.exit(1)
              
          if not os.path.exists(json_path):
              print(f'❌ Error: {json_path} no existe.')
              sys.exit(1)
              
          try:
              with open(json_path, 'r') as f:
                  data = json.load(f)
              
              client = genai.Client(api_key=api_key)
              
              max_retries = 3
              wait_time = 15
              response = None

              for attempt in range(max_retries):
                  try:
                      response = client.models.generate_content(
                          model='gemini-2.0-flash',
                          contents=f'Analiza: {json.dumps(data[:2])}'
                      )
                      break
                  except APIError as e:
                      if e.code == 429 and attempt < max_retries - 1:
                          print(f'⚠️ Cuota excedida (429). Reintentando en {wait_time} segundos... (Intento {attempt + 1}/{max_retries})')
                          time.sleep(wait_time)
                          wait_time *= 2
                      else:
                          raise e

              if response:
                  print(response.text)
          except Exception as e:
              print(f'❌ Error crítico: {e}')
              sys.exit(1)
          "
